<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quizz culture G (version Léo)</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --primary-glow: rgba(56, 189, 248, 0.3);
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.6;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 700px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      font-weight: 900;
      font-size: 32px;
      text-align: center;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
      margin: 20px 0;
      text-transform: uppercase;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .final-score-container {
      text-align: center;
      padding: 20px 0;
    }
    
    .big-score-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--primary);
      font-weight: 700;
      display: block;
      margin-bottom: 5px;
    }

    .big-score-value {
      font-size: 82px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(to bottom, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    #scoreMessage {
      font-size: 24px;
      font-weight: 800;
      margin-top: 10px;
      display: block;
      color: var(--success);
    }

    .hidden { display: none !important; }

    .input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 14px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn.primary { background: var(--primary); color: #0f172a; box-shadow: 0 4px 15px var(--primary-glow); }
    .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--primary-glow); }
    
    .btn.success { background: var(--success); color: #fff; }
    .btn.danger { background: var(--danger); color: #fff; }

    .leaderboard { list-style: none; padding: 0; }
    .leaderboard li {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .rank-1 { border-color: #fbbf24 !important; background: rgba(251, 191, 36, 0.05) !important; }
    
    .lbRow { display: flex; justify-content: space-between; font-weight: 700; }
    .lbDate { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .pill {
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="brand">QuizZ Culture G (version Léo)</div>

<!-- Écran de Départ -->
<section class="card" id="screen-start" style="text-align: center;">
  <div style="margin-bottom: 30px;">
    <!-- "Règles :" seul sur sa ligne, centré et ultra gras -->
    <h2 style="font-weight: 900; text-transform: uppercase; margin-bottom: 15px;">Règles :</h2>
    
    <!-- Chaque phrase sur sa ligne, centrée -->
    <p style="margin: 5px 0; font-weight: 500;">Il y a 20 blocs</p>
    <p style="margin: 5px 0; font-weight: 500;">Si c’est bon, tu débloques la sous-question suivante (tiroir).</p>
    <p style="margin: 5px 0; font-weight: 500;">Si c’est faux, on passe au bloc suivant.</p>
    <p style="margin: 15px 0; font-weight: 500;">Il y a aussi des questions à choix multiples</p>
    
    <!-- "Prêt ?" en ultra gras -->
    <h3 style="font-weight: 900; font-size: 24px; margin-top: 20px;">Prêt ?</h3>
  </div>

  <input id="nameInput" class="input" placeholder="Ton prénom..." maxlength="20" />
  <button id="btnStart" class="btn primary" style="width:100%">Lancer le Quiz</button>
</section>

    <section class="card hidden" id="screen-quiz">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <span id="progress" class="pill"></span>
        <span id="score" class="pill" style="color:var(--primary)"></span>
      </div>
      <div id="kicker" class="muted" style="font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:10px"></div>
      <h2 id="questionText" style="font-size:24px; margin-top:0"></h2>
      <div id="questionPoints" style="color:var(--primary); font-weight:700"></div>
      
      <div style="display:flex; gap:12px; margin-top:30px;">
        <button id="btnWrong" class="btn danger" style="flex:1">Faux</button>
        <button id="btnRight" class="btn success" style="flex:1">Bon</button>
      </div>
      <button id="btnUndo" class="btn" style="background:transparent; color:var(--muted); width:100%; margin-top:15px; font-size:12px">Annuler l'action</button>
    </section>

    <!-- Écran de Fin -->
    <section class="card hidden" id="screen-end">
      <div class="final-score-container">
        <span class="big-score-label">Ton Score Final</span>
        <div class="big-score-value" id="finalScore">0</div>
        <span id="scoreMessage">Excellent !</span>
      </div>
      
      <div style="margin: 30px 0;">
        <h3 style="text-align:center; text-transform:uppercase; font-size:14px; letter-spacing:2px">CLASSEMENT</h3>
        <ol id="leaderboard" class="leaderboard"></ol>
      </div>

      <button id="btnRestart" class="btn primary" style="width:100%">Rejouer</button>
    </section>
  </main>

  <script>
    const BLOCKS = [
      { id: 1, items: [
        { level: 0, label: "1)", points: 1, text: "Comment s'appelle la plus grand Pyramide d'Egypte ?" },
        { level: 1, label: "a)", points: 3, text: "À cinq cents ans près, en quelle année fut elle construite ?" },
        { level: 2, label: "i.", points: 4, text: "Quelles sont les 6 autres merveilles antiques ?" },
        { level: 3, label: "–", points: 5, text: "Quel pharaon a construit la seconde plus grande pyramide d'Egypte ? (Indice : c'est aussi le nom de la Pyramide)" },
      ]},
      { id: 2, items: [
        { level: 0, label: "2)", points: 2, text: "Comment s'appelle le personnage principal de la série Breaking Bad ?" },
        { level: 1, label: "a)", points: 2, text: "Quel est son surnom dans la série ?" },
        { level: 2, label: "i.", points: 4, text: "Ce surnom est le nom d'un célèbre physicien, à quel siècle a-t-il vécu ?" },
        { level: 3, label: "–", points: 5, text: "Dans quel domaine de la physique a-t-il fait ses principaux travaux ?" },
      ]},
    ];

    let playerName = "", score = 0, blockIndex = 0, levelIndex = 0, history = [];
    const $ = (id) => document.getElementById(id);

    function renderQuestion() {
      const block = BLOCKS[blockIndex];
      const item = block.items[levelIndex];
      $("questionText").textContent = item.text;
      $("questionPoints").textContent = `+ ${item.points} points`;
      $("kicker").textContent = `Bloc ${blockIndex + 1} • Question ${item.label}`;
      $("progress").textContent = `Etape ${blockIndex + 1}/30`;
      $("score").textContent = `Score: ${score}`;
      $("btnUndo").style.opacity = history.length ? "1" : "0";
    }

    function finishQuiz() {
      $("finalScore").textContent = score;
$("scoreMessage").textContent = 
    score > 80 ? "BIG LEAGUES 🏆" : 
    score > 60 ? "Pas mal !! 🔥" : 
    score > 40 ? "Pas mal 👍" : 
    score > 20 ? "Peut mieux faire ! 🤨" : 
    "NABILLA TIER 📞";
      $("screen-quiz").classList.add("hidden");
      $("screen-end").classList.remove("hidden");
      
      renderLeaderboard([{name: playerName, score: score, date: new Date()}]);
    }

    function renderLeaderboard(entries) {
      const list = $("leaderboard");
      list.innerHTML = "";
      entries.forEach((e, i) => {
        const li = document.createElement("li");
        if(i === 0) li.className = "rank-1";
        li.innerHTML = `
          <div class="lbRow"><span>🥇 ${e.name}</span><span>${e.score} pts</span></div>
          <div class="lbDate">Le ${new Date(e.date).toLocaleDateString()}</div>
        `;
        list.appendChild(li);
      });
    }

    // Events
    $("btnStart").onclick = () => {
      playerName = $("nameInput").value || "Anonyme";
      $("screen-start").classList.add("hidden");
      $("screen-quiz").classList.remove("hidden");
      renderQuestion();
    };

    $("btnRight").onclick = () => {
      const item = BLOCKS[blockIndex].items[levelIndex];
      history.push({b: blockIndex, l: levelIndex, s: score});
      score += item.points;
      if(levelIndex < 3) levelIndex++; else { blockIndex++; levelIndex = 0; }
      if(blockIndex >= BLOCKS.length) finishQuiz(); else renderQuestion();
    };

    $("btnWrong").onclick = () => {
      history.push({b: blockIndex, l: levelIndex, s: score});
      blockIndex++; levelIndex = 0;
      if(blockIndex >= BLOCKS.length) finishQuiz(); else renderQuestion();
    };

    $("btnUndo").onclick = () => {
      const last = history.pop();
      if(!last) return;
      blockIndex = last.b; levelIndex = last.l; score = last.s;
      renderQuestion();
    };

    $("btnRestart").onclick = () => location.reload();
  </script>
</body>
</html>
