<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quizz culture G (version Léo)</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --primary-glow: rgba(56, 189, 248, 0.3);
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      display: flex;
      justify-content: center;
      margin: 0;
    }
    .app { width: 100%; max-width: 700px; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .brand { font-weight: 900; font-size: 32px; text-align: center; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; text-transform: uppercase; }
    .card { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .final-score-container { text-align: center; padding: 20px 0; }
    .big-score-value { font-size: 82px; font-weight: 900; line-height: 1; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hidden { display: none !important; }
    .input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; margin-bottom: 20px; }
    .btn { padding: 16px 24px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; transition: all 0.2s; text-transform: uppercase; }
    .btn.primary { background: var(--primary); color: #0f172a; }
    .btn.success { background: var(--success); color: #fff; }
    .btn.danger { background: var(--danger); color: #fff; }
    .leaderboard { list-style: none; padding: 0; }
    .leaderboard li { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
    .pill { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; }
  </style>
</head>
<body>
  <main class="app">
    <div class="brand">QuizZ Culture G (version Léo)</div>

    <section class="card" id="screen-start" style="text-align: center;">
      <div style="margin-bottom: 30px;">
        <h2 style="font-weight: 900; text-transform: uppercase; margin-bottom: 15px;">Règles :</h2>
        <p style="margin: 5px 0; font-weight: 500;">Il y a 20 blocs de 4 questions</p>
        <p style="margin: 5px 0; font-weight: 500;">Si c’est bon, tu débloques la sous-question suivante (tiroir)</p>
        <p style="margin: 5px 0; font-weight: 500;">Si c’est faux, on passe au bloc suivant</p>
        <p style="margin: 15px 0; font-weight: 500;">Ce sont des questions fermées / ouvertes / QCM / Vrai ou faux </p>
        <h3 style="font-weight: 700; font-size: 24px; margin-top: 20px;">Prêt ?</h3>
      </div>
      <input id="nameInput" class="input" placeholder="Ton prénom..." maxlength="20" />
      <button id="btnStart" class="btn primary" style="width:100%">Lancer le Quiz</button>
    </section>

    <section class="card hidden" id="screen-quiz">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <span id="progress" class="pill"></span>
        <span id="score" class="pill" style="color:var(--primary)"></span>
      </div>
      <div id="kicker" class="muted" style="font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:10px"></div>
      <h2 id="questionText" style="font-size:24px; margin-top:0"></h2>
      <div id="questionPoints" style="color:var(--primary); font-weight:700"></div>
      <div style="display:flex; gap:12px; margin-top:30px;">
        <button id="btnWrong" class="btn danger" style="flex:1">Faux</button>
        <button id="btnRight" class="btn success" style="flex:1">Bon</button>
      </div>
      <button id="btnUndo" class="btn" style="background:transparent; color:var(--muted); width:100%; margin-top:15px; font-size:12px">Annuler l'action</button>
    </section>

    <section class="card hidden" id="screen-end">
      <div class="final-score-container">
        <span style="text-transform:uppercase; font-size:14px; letter-spacing:2px;">Ton Score Final</span>
        <div class="big-score-value" id="finalScore">0</div>
        <span id="scoreMessage" style="font-size:24px; font-weight:800; color:var(--success);"></span>
      </div>
      <div style="margin-top: 30px;">
        <h3 style="text-align:center; text-transform:uppercase; font-size:14px;">Classement</h3>
        <ol id="leaderboard" class="leaderboard"></ol>
      </div>
    </section>
  </main>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGBrUA4gstDJzYedmpjHgVF5EY3cHhJFi9xOda_us8a5C5MlRgGS_N6RY-xrZL-idX4w/exec";

    const BLOCKS = [
  { id: 1, name: "HISTOIRE DE FRANCE", items: [
    { level: 0, label: "1", points: 2, text: "Quel est le surnom de Louis XIV ?" },
    { level: 1, label: "2", points: 3, text: "Qui est considéré comme le premier roi des Francs ?" },
    { level: 2, label: "3", points: 4, text: "Quel roi de France est considéré le roi emblématique de la Renaissance française ?" },
    { level: 3, label: "4", points: 5, text: "Quelles sont les trois maisons prétendantes au trône de France ?" }
  ]},
  { id: 2, name: "HISTOIRE ANCIENNE", items: [
    { level: 0, label: "1", points: 2, text: "Dans quel pays sont nés les jeux olympiques antiques ?" },
    { level: 1, label: "2", points: 3, text: "Vrai ou faux : Les femmes pouvaient-elles participer aux jeux olympiques antiques ?" },
    { level: 2, label: "3", points: 2, text: "Dans quel pays non-européen Bonaparte mène-t-il une campagne militaire en 1798 ?" },
    { level: 3, label: "4", points: 3, text: "Bonaparte y découvre la pierre de rosette qui a permis à un historien et linguiste français de déchiffrer les hiéroglyphes, comment s'appelait-il ?" }
  ]},
  { id: 3, name: "SPORTS", items: [
    { level: 0, label: "1", points: 2, text: "Quel joueur de football est surnommé CR7 ?" },
    { level: 1, label: "2", points: 3, text: "Dans quel club anglais a-t-il joué ?" },
    { level: 2, label: "3", points: 4, text: "Citez 4 joueuses de football féminin" },
    { level: 3, label: "4", points: 5, text: "Quel joueur de champs non britannique possède le record d'apparitions en Premier League ?" }
  ]},
  { id: 4, name: "SPORTS 2", items: [
    { level: 0, label: "1", points: 2, text: "Dans quel sport (non automobile) utilise-t-on un volant ?" },
    { level: 1, label: "2", points: 3, text: "Quelles sont les trois nations les plus décorées à la coupe du monde ?" },
    { level: 2, label: "3", points: 4, text: "Quel boxeur a battu Mohammed Ali pour la première fois en 1971 lors du Fight of the Century ?" },
    { level: 3, label: "4", points: 5, text: "Quel est le nom du seul joueur ou joueuse de tennis à avoir réalisé le 'Golden Slam' (4 Grand Chelems + JO la même année) ?" }
  ]},
  { id: 5, name: "MUSIQUE", items: [
    { level: 0, label: "1", points: 2, text: "Quel compositeur classique autrichien a écrit plus de 600 œuvres avant de mourir à seulement 35 ans ?" },
    { level: 1, label: "2", points: 3, text: "Quel rappeur français est surnommé 'Le docteur' ?" },
    { level: 2, label: "3", points: 3, text: "Quel est l'album le plus vendu de tous les temps dans le monde ?" },
    { level: 3, label: "4", points: 4, text: "De quel pays vient le groupe ABBA ?" }
  ]},
  { id: 6, name: "AUTOMOBILE", items: [
    { level: 0, label: "1", points: 2, text: "De quel pays est originaire la marque de luxe Porsche ?" },
    { level: 1, label: "2", points: 3, text: "Quel groupe automobile mondial possède les marques Peugeot, Citroën, Fiat et Jeep ?" },
    { level: 2, label: "3", points: 4, text: "Quelle est la voiture iconique de James Bond ?" },
    { level: 3, label: "4", points: 5, text: "Citez 3 acteurs de James Bond" }
  ]},
  { id: 7, name: "GASTRONOMIE", items: [
    { level: 0, label: "1", points: 2, text: "Quel fromage italien est protégé et ne peut être produit que dans certaines provinces autour de Parme ?" },
    { level: 1, label: "2", points: 3, text: "QCM : Quelle est l'épice la plus chère au monde au kilo ? A) La Vanille  B) Le Safran  C) Le Poivre long  D) La noix de muscade" },
    { level: 2, label: "3", points: 4, text: "Quel chef a été le premier à codifier et professionnaliser la cuisine raffinée ?" },
    { level: 3, label: "4", points: 4, text: "Qu'est-ce que 'blanchir' un légume ?" }
  ]},
  { id: 8, name: "GEOGRAPHIE", items: [
    { level: 0, label: "1", points: 2, text: "Quel est le plus grand océan du monde ?" },
    { level: 1, label: "2", points: 3, text: "QCM : Quel est le plus grand désert mondial ? A) Désert d'Antarctique  B) Désert d'Arabie  C) Sahara  D) Désert d'Arctique" },
    { level: 2, label: "3", points: 4, text: "Quel est le seul pays d'Asie du Sud-Est sans accès à la mer ?" },
    { level: 3, label: "4", points: 4, text: "Quelle est la capitale du Kazakhstan ?" }
  ]},
  { id: 9, name: "GEOGRAPHIE II", items: [
    { level: 0, label: "1", points: 2, text: "Quel fleuve traverse la ville de Londres ?" },
    { level: 1, label: "2", points: 3, text: "QCM : Quel pays est le plus grand : l'Algérie, le Congo, le Soudan ou la Libye ?" },
    { level: 2, label: "3", points: 3, text: "Quelle planète est la plus proche du soleil ?" },
    { level: 3, label: "4", points: 5, text: "Quel est le diamètre de la Terre ? (au millier de kilomètres près)" }
  ]},
  { id: 10, name: "WWII", items: [
    { level: 0, label: "1", points: 2, text: "Quel est le titre du livre écrit par Adolf Hitler durant son séjour en prison en 1924 ?" },
    { level: 1, label: "2", points: 2, text: "Quelle bataille de 1942 à 1943 est considérée comme le tournant décisif sur le front de l'Est ?" },
    { level: 2, label: "3", points: 4, text: "Combien de personnes le régime nazi a-t-il exterminé au total ? (au million près)" },
    { level: 3, label: "4", points: 5, text: "Quel est le nom des deux bombes atomiques larguées sur Hiroshima et Nagasaki ?" }
  ]},
  { id: 11, name: "ECONOMIE", items: [
    { level: 0, label: "1", points: 2, text: "Que signifie PIB ?" },
    { level: 1, label: "2", points: 3, text: "Quelle organisation gère l'euro ?" },
    { level: 2, label: "3", points: 5, text: "À combien le SMIC est-il valorisé depuis le 1er janvier 2026 ? (arrondi à la vingtaine près)" },
    { level: 3, label: "4", points: 5, text: "Quel économiste a théorisé la loi des avantages comparatifs ?" }
  ]},
  { id: 12, name: "DIVERS", items: [
    { level: 0, label: "1", points: 2, text: "Quel est le nom du créateur de Facebook ?" },
    { level: 1, label: "2", points: 3, text: "Quel film oscarisé a été le biopic de Facebook ?" },
    { level: 2, label: "3", points: 4, text: "Quel acteur possède le plus d'oscars du meilleur acteur ?" },
    { level: 3, label: "4", points: 4, text: "Quelle actrice possède le plus de César de la meilleure actrice ?" }
  ]},
  { id: 13, name: "ARTS", items: [
    { level: 0, label: "1", points: 2, text: "Qui a écrit 'Madame Bovary' en 1857 ?" },
    { level: 1, label: "2", points: 3, text: "Il a été cité comme l'un des plus grands romanciers français de son siècle, citez-en 2 autres." },
    { level: 2, label: "3", points: 4, text: "Quel philosophe est connu pour sa philosophie de l'absurde ?" },
    { level: 3, label: "4", points: 5, text: "Citer 3 œuvres du cycle de l'absurde." }
  ]},
  { id: 14, name: "POPULATION & ASIE", items: [
    { level: 0, label: "1", points: 3, text: "Quels sont les 3 pays les plus peuplés au monde ?" },
    { level: 1, label: "2", points: 4, text: "Citez 4 villes en Chine." },
    { level: 2, label: "3", points: 5, text: "Quel est le nom du dirigeant nationaliste chinois rival de Mao Zedong ?" },
    { level: 3, label: "4", points: 6, text: "Comment s'appelle la fonderie de semiconducteurs à Taïwan ?" }
  ]},
  { id: 15, name: "GRANDES FEMMES", items: [
    { level: 0, label: "1", points: 2, text: "Quelle militante américaine des droits civiques a refusé de céder sa place dans un bus à un homme blanc ?" },
    { level: 1, label: "2", points: 3, text: "Quelle loi Simone Veil a-t-elle fait adopter en 1975 malgré une opposition violente à l'Assemblée nationale ?" },
    { level: 2, label: "3", points: 5, text: "Quelle célèbre femme française du XVIIIème siècle a rédigé La Déclaration des droits de la Femme et de la citoyenne ?" },
    { level: 3, label: "4", points: 6, text: "Quelle célèbre femme birmane a reçu le prix Nobel de la paix en 1991 ?" }
  ]},
];

    let playerName = "", score = 0, blockIndex = 0, levelIndex = 0, history = [];
    const $ = (id) => document.getElementById(id);

    async function finishQuiz() {
      $("screen-quiz").classList.add("hidden");
      $("screen-end").classList.remove("hidden");
      $("finalScore").textContent = score;
      $("scoreMessage").textContent = score > 85 ? "LÉGENDE 🏆" : score > 50 ? "BIEN JOUÉ 👍" : "NABILLA TIER 📞";
      try {
        await fetch(`${GOOGLE_SCRIPT_URL}?name=${encodeURIComponent(playerName)}&score=${score}`, { mode: 'no-cors' });
      } catch(e) {}
      loadLiveLeaderboard();
    }

    async function loadLiveLeaderboard() {
      $("leaderboard").innerHTML = "<li>Chargement...</li>";
      try {
        const res = await fetch(GOOGLE_SCRIPT_URL + "?t=" + Date.now());
        const data = await res.json();
        $("leaderboard").innerHTML = data.map((e, i) => `
          <li><div style="display:flex; justify-content:space-between;">
            <span>${i<3 ? ['🥇','🥈','🥉'][i] : '👤'} ${e.name}</span>
            <span>${e.score} pts</span>
          </div></li>`).join('') || "<li>Aucun score</li>";
      } catch(e) { $("leaderboard").innerHTML = "<li>Erreur</li>"; }
    }

    $("btnStart").onclick = () => {
      playerName = $("nameInput").value || "Anonyme";
      $("screen-start").classList.add("hidden");
      $("screen-quiz").classList.remove("hidden");
      renderQuestion();
    };

    $("btnRight").onclick = () => {
      history.push({b: blockIndex, l: levelIndex, s: score});
      score += BLOCKS[blockIndex].items[levelIndex].points;
      if(levelIndex < BLOCKS[blockIndex].items.length - 1) levelIndex++; else { blockIndex++; levelIndex = 0; }
      if(blockIndex >= BLOCKS.length) finishQuiz(); else renderQuestion();
    };

    $("btnWrong").onclick = () => {
      history.push({b: blockIndex, l: levelIndex, s: score});
      blockIndex++; levelIndex = 0;
      if(blockIndex >= BLOCKS.length) finishQuiz(); else renderQuestion();
    };

    $("btnUndo").onclick = () => {
      const last = history.pop();
      if(last) { blockIndex = last.b; levelIndex = last.l; score = last.s; renderQuestion(); }
    };

    function renderQuestion() {
      const block = BLOCKS[blockIndex];
      const item = block.items[levelIndex];
      $("questionText").textContent = item.text;
      $("questionPoints").textContent = `+ ${item.points} points`;
      $("kicker").textContent = `${block.name} • Question ${item.label}`;
      $("progress").textContent = `Thème ${blockIndex + 1}/${BLOCKS.length}`;
      $("score").textContent = `Score: ${score}`;
    }
  </script>
</body>
</html>
